<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h1 class="text-center">Note App</h1>

    <div class="mb-3">
        <label for="noteInput" class="form-label">Add a note</label>
        <textarea id="noteInput" class="form-control" placeholder="Write a note..."></textarea>
    </div>

    <button class="btn btn-primary mb-4" onclick="addNote()">Add Note</button>

    <hr>

   
    <div id="notesContainer" class="list-group"></div>

    <script>
        function addNote() {
            // 1. Pegar o texto do campo
            const text = document.getElementById('noteInput').value;

            // 2. Verificar se não está vazio
            if (text.trim() === "") {
                alert("Escreva alguma nota antes de adicionar!");
                return;
            }

            // 3. Criar o elemento da nota
            const newNote = document.createElement('div');
            newNote.className = "list-group-item shadow-sm mb-2 d-flex justify-content-between align-items-center";
            newNote.innerHTML = `
                <span>${text}</span>
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">X</button>
            `;

            // 4. Adicionar na lista e limpar o campo
            document.getElementById('notesContainer').appendChild(newNote);
            document.getElementById('noteInput').value = "";
        }
    </script>

</body>
</html>
